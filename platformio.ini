; Claude Hardware Buddy — Waveshare ESP32-S3-Touch-AMOLED-2.06
; Build: pio run -t upload && pio device monitor
[env:waveshare-s3-amoled-206]
platform  = espressif32
board     = esp32-s3-devkitc-1   ; ESP32-S3R8, 8MB PSRAM / 32MB flash (see board_build below)
framework = arduino
monitor_speed = 115200
upload_speed  = 921600
upload_port   = /dev/cu.usbmodem1201
monitor_port  = /dev/cu.usbmodem1201

; --- Flash / PSRAM: 32MB flash, 8MB OPI PSRAM ---
board_build.flash_mode = qio
; ESP32-S3R8 = QIO flash + OPI (octal) PSRAM. This is the knob the Arduino
; framework actually reads to pick the right bootloader/PSRAM line mode;
; without it you get "PSRAM ID read error / wrong PSRAM line mode".
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_upload.flash_size = 32MB
board_build.partitions = default_16MB.csv

build_src_filter = +<*> +<buddies/>

build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1             ; USB-CDC
    -D ARDUINO_USB_CDC_ON_BOOT=1      ; Serial over USB on boot
    -D CONFIG_SPIRAM_USE_MALLOC=1
    ; --- NimBLE: enough connection + bonding storage ---
    -D CONFIG_BT_NIMBLE_MAX_BONDS=4
    -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=2

lib_deps =
    moononournation/GFX Library for Arduino @ 1.6.0
    h2zero/NimBLE-Arduino @ ^1.4.2
    bblanchon/ArduinoJson @ ^7.0.0
    lewisxhe/XPowersLib @ 0.2.6
    lewisxhe/SensorLib @ 0.3.1
    ; FT3168 touch read directly over I2C; buddy renders direct to Arduino_GFX.
    ; No LVGL, no DriveBus. Mylibrary optional (config.h has verified fallback).

; If you prefer Arduino IDE instead of PlatformIO:
;   Board:        ESP32S3 Dev Module
;   PSRAM:        OPI PSRAM
;   USB CDC On Boot: Enabled
;   Flash Size:   32MB
;   Partition:    16M Flash (3MB APP/9.9MB FATFS) or similar
